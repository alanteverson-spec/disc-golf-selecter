<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find Your Flight</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Find Your Flight</h1>
      <p class="subtitle">
        Type a disc name and press Enter to find comparable discs with similar
        flight numbers, including a visual disc card for every result.
      </p>

      <label for="disc-search" class="input-label">Disc name</label>
      <input
        id="disc-search"
        type="text"
        placeholder="Example: Destroyer"
        autocomplete="off"
      />

      <section id="results" aria-live="polite"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
